name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run unit & integration tests with coverage
        run: npm run test:coverage

      - name: Night Worker test summary
        if: always()
        run: |
          echo "## Night Worker Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests cover:" >> $GITHUB_STEP_SUMMARY
          echo "- Provider status detection (return codes, rate limits, timeouts)" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline chaining logic (step transitions, content truncation)" >> $GITHUB_STEP_SUMMARY
          echo "- UI components (StatusBadge, ProviderBadge, NightWorkerContext)" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline templates (loading, saving, normalization)" >> $GITHUB_STEP_SUMMARY
          echo "- Supabase API retry logic (backoff, error codes)" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
